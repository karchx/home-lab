apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: example-spark-py-app
  namespace: de
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  
  image: "192.168.0.9:32000/example-spark:1.0.1"
  imagePullPolicy: IfNotPresent
  
  mainApplicationFile: "local:///opt/spark/example/main.py"
  
  sparkVersion: "3.4.0"
  driver:
    cores: 1
    coreLimit: "1000m"
    memory: "512m"
    serviceAccount: spark
  executor:
    cores: 1
    instances: 1
    memory: "1024m"

